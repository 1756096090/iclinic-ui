    <div class="flex flex-col items-center justify-center py-12 px-4 gap-4">
      <div class="w-16 h-16 bg-gray-100 rounded-lg flex items-center justify-center text-3xl border border-gray-200">
        {{ icon() }}
      </div>
      <h3 class="text-lg font-semibold text-gray-900">{{ title() }}</h3>
      <p class="text-sm text-gray-600 text-center max-w-sm">{{ message() }}</p>
      @if (actionLabel()) {
        <button 
          (click)="onAction()" 
          class="mt-2 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition font-medium text-sm"
        >
          {{ actionLabel() }}
        </button>
      }
    </div>
